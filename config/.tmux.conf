new-session

set -g default-terminal "screen-256color"
set -g history-limit 1000000

set -sg escape-time 10

set -g set-titles on

#set -g focus-events on

# change background color with focus event - should be same value as in .vimrc
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=colour250,bg=colour234'

#remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind c new-window -c "#{pane_current_path}"

bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

#reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# toggle last window like screen
bind-key C-a last-window

# next
bind-key -r Space next-window
bind-key -r "C-Space" next-window

######################
### DESIGN CHANGES ###
######################

# panes
set -g pane-border-style "fg=colour238,bg=colour235"
set -g pane-active-border-style "fg=colour51,bg=colour236"

## Status bar design
# status line
set -g status-style "bg=colour234,fg=colour137,dim"
set -g status-interval 1

# messaging
set -g message-style "fg=colour232,bg=colour166,bold"
set -g message-command-style "fg=blue,bg=black"

#window mode
setw -g mode-style "fg=colour196,bg=colour238,bold"

# window status
setw -g window-status-format " #F#I:#W#F "
setw -g window-status-current-format " #F#I:#W#F "
setw -g window-status-format "#[fg=magenta]#[bg=black] #I #[bg=cyan]#[fg=colour8] #W "
setw -g window-status-current-format "#[bg=brightmagenta]#[fg=colour8] #I #[fg=colour8]#[bg=colour14] #W "
setw -g window-status-current-style "fg=colour81,bg=colour238,bold"
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-style "fg=colour138,bg=colour235,none"
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '
setw -g window-status-bell-style "fg=colour255,bg=colour1,bold"

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# The modes {
setw -g clock-mode-colour colour135

# }

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on
unbind -n MouseDown3Pane

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

###############################################
# $(echo $USER) - shows the current username
# %a --> Day of week (Mon)
# %A --> Day of week Expanded (Monday)

# %b --> Month (Jan)
# %d --> Day (31)
# %Y --> Year (2017)

# %D --> Month/Day/Year (12/31/2017)
# %v --> Day-Month-Year (31-Dec-2017)

# %r --> Hour:Min:Sec AM/PM (12:30:27 PM)
# %T --> 24 Hour:Min:Sec (16:30:27)
# %X --> Hour:Min:Sec (12:30:27)
# %R --> 24 Hour:Min (16:30)
# %H --> 24 Hour (16)
# %l --> Hour (12)
# %M --> Mins (30)
# %S --> Seconds (09)
# %p --> AM/PM (AM)

set-option -s status-interval 1
set -g status-justify left
set -g status-right '#(TZ=Asia/Seoul date "+%Y-%m-%d %H:%M:%S KST")'
#set -g status-right '#[fg=colour241,bg=colour234,bold]#[fg=colour233,bg=colour241,bold] %Y(CW%W) %b %d %A #[fg=colour245,bg=colour241,bold]#[fg=colour233,bg=colour245,bold] %p %H:%M:%S '
set -g status-right-length 50
if-shell '[ -z "${C9_USER}" ]' "set -g status-left \"#[fg=green]#(whoami)@#H \""
set -g status-left-length 20
